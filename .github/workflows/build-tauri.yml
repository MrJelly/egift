name: 构建电子礼簿

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: tauri-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  windows:
    name: Windows EXE
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: 检出源码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.x.x

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 Windows 安装包
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles nsis
          tagName: ${{ github.ref_name }}
          releaseName: 电子礼簿 ${{ github.ref_name }}
          releaseBody: 正式版本自动构建的 Windows 安装包与 Android APK。
          releaseDraft: false
          prerelease: false
          retryAttempts: 2
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: egift-windows-x64-[bundle]
          releaseAssetNamePattern: egift_[version]_windows_x64[setup].[ext]

  android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 检出源码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.x.x

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: 安装 Rust Android 编译目标
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: 安装 Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          link-to-sdk: true

      - name: 缓存 Rust 构建
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 初始化 Android 工程
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: pnpm tauri android init --ci

      - name: 适配 Android 系统安全区
        run: pnpm tauri:android:safe-area

      - name: 构建可安装 APK
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        with:
          mobile: android
          args: --apk --debug --target aarch64
          tagName: ${{ github.ref_name }}
          releaseName: 电子礼簿 ${{ github.ref_name }}
          releaseBody: 正式版本自动构建的 Windows 安装包与 Android APK。
          releaseDraft: false
          prerelease: false
          retryAttempts: 2
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: egift-android-arm64-[bundle]-[mode]
          releaseAssetNamePattern: egift_[version]_android_arm64_[mode].[ext]
