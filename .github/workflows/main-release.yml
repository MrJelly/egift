name: main 自动发版

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: main-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  windows:
    name: Windows EXE
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: 检出源码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.x.x

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 Windows 安装包
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles nsis
          retryAttempts: 2
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: egift-windows-x64-[bundle]

  android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 检出源码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.x.x

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: 安装 Rust Android 编译目标
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: 安装 Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          link-to-sdk: true

      - name: 缓存 Rust 构建
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 初始化 Android 工程
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: pnpm tauri android init --ci

      - name: 适配 Android 系统安全区
        run: pnpm tauri:android:safe-area

      - name: 构建 APK
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        with:
          mobile: android
          args: --apk --debug --target aarch64
          retryAttempts: 2
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: egift-android-arm64-[bundle]-[mode]

  publish:
    name: 发布 main 预览版
    runs-on: ubuntu-latest
    needs:
      - windows
      - android
    timeout-minutes: 15
    permissions:
      contents: write
      actions: read

    steps:
      - name: 检出源码
        uses: actions/checkout@v6

      - name: 下载构建产物
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts

      - name: 创建预发布 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: main-latest
        run: |
          set -euo pipefail

          gh release delete "$TAG_NAME" --cleanup-tag --yes || true
          git tag -f "$TAG_NAME" "$GITHUB_SHA"
          git push --force origin "refs/tags/$TAG_NAME"

          mapfile -t raw_files < <(find release-artifacts -type f | sort)
          if [ "${#raw_files[@]}" -eq 0 ]; then
            echo "没有找到可发布的构建产物"
            exit 1
          fi

          mkdir -p publish-assets
          for file in "${raw_files[@]}"; do
            case "$file" in
              *.apk)
                cp "$file" "publish-assets/egift_main_${GITHUB_RUN_NUMBER}_android_arm64_debug.apk"
                ;;
              *.exe)
                cp "$file" "publish-assets/egift_main_${GITHUB_RUN_NUMBER}_windows_x64-setup.exe"
                ;;
              *)
                cp "$file" "publish-assets/$(basename "$file")"
                ;;
            esac
          done

          mapfile -t files < <(find publish-assets -type f | sort)

          printf '准备发布以下产物：\n'
          printf '%s\n' "${files[@]}"

          gh release create "$TAG_NAME" "${files[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "电子礼簿 main 自动构建 #${GITHUB_RUN_NUMBER}" \
            --notes "main 分支自动构建。提交：${GITHUB_SHA}" \
            --prerelease \
            --latest=false
