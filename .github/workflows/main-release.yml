name: main 自动发版

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: main-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  windows:
    name: Windows EXE
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: 检出源码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.x.x

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 Windows 安装包并发布预览版
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles nsis
          tagName: main-${{ github.run_number }}
          releaseName: "电子礼簿 main 自动构建 #${{ github.run_number }}"
          releaseBody: main 分支自动构建。提交：${{ github.sha }}
          releaseDraft: false
          prerelease: true
          retryAttempts: 2
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: egift-windows-x64-[bundle]
          releaseAssetNamePattern: egift_main_${{ github.run_number }}_windows_x64[setup].[ext]

  android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 检出源码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.x.x

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: 安装 Rust Android 编译目标
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: 安装 Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          link-to-sdk: true

      - name: 缓存 Rust 构建
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 初始化 Android 工程
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: pnpm tauri android init --ci

      - name: 构建 APK 并发布预览版
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        with:
          mobile: android
          args: --apk --debug --target aarch64
          tagName: main-${{ github.run_number }}
          releaseName: "电子礼簿 main 自动构建 #${{ github.run_number }}"
          releaseBody: main 分支自动构建。提交：${{ github.sha }}
          releaseDraft: false
          prerelease: true
          retryAttempts: 2
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: egift-android-arm64-[bundle]-[mode]
          releaseAssetNamePattern: egift_main_${{ github.run_number }}_android_arm64_[mode].[ext]
